[BASE_INFO]
appname = 'qq_social_bot_app'

[PACKAGE_PATH_INFO]
ROOT_PACKAGE = 'qq_social_bot_app'

[CORE_PACKAGE]
default = ['${ROOT_PACKAGE}.intelligence.agentic']
agent = ['${ROOT_PACKAGE}.intelligence.agentic.agent']
llm = ['${ROOT_PACKAGE}.intelligence.agentic.llm']
llm_channel = ['${ROOT_PACKAGE}.intelligence.agentic.llm']
tool = ['${ROOT_PACKAGE}.intelligence.agentic.tool']
toolkit = ['${ROOT_PACKAGE}.intelligence.agentic.toolkit']
skill = ['${ROOT_PACKAGE}.intelligence.agentic.skill']
memory = ['${ROOT_PACKAGE}.intelligence.agentic.memory']
prompt = ['${ROOT_PACKAGE}.intelligence.agentic.prompt']

[SUB_CONFIG_PATH]
log_config_path = './log_config.toml'
custom_key_path = './custom_key.toml'

[DB]
system_db_uri = ''

[GUNICORN]
activate = 'false'

[GRPC]
activate = 'false'
max_workers = 10
server_port = 50051

[BOT_CONFIG]
data_root = '~/.qq_bot_data'
image_cache_dir = '~/.qq_bot_data/image_cache'
redis_url = 'redis://localhost:6379/0'
bot_id = 'bot_self'
bot_names = ['米浴', '米宝', '神の人形']
ws_host = '127.0.0.1'
ws_port = 8082
ws_path = '/ws/onebot'
periodic_check_interval = 120
prob_floor = 0.2
prob_ceil = 0.7
