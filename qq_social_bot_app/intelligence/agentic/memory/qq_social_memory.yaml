name: 'qq_social_memory'
description: |
  QQ group chat social memory - Markdown files + ChromaDB vector index + Redis working memory.
  This memory does NOT use the standard add()/get() interface because it manages
  multiple heterogeneous storage layers (Markdown persona files, Redis working memory,
  ChromaDB embeddings, and raw JSONL archives).  Instead it exposes
  async_add_group_message(s)() for writes and async_build_context() for reads.
  Configuration (data_root, redis_url) is read from config.toml [BOT_CONFIG].
type: 'long_term'
memory_key: 'chat_history'
max_tokens: 8000
metadata:
  type: 'MEMORY'
  module: 'qq_social_bot_app.intelligence.agentic.memory.qq_social_memory'
  class: 'QQSocialMemory'
