summarizer: |
  压缩以下群聊对话记录，保留关键信息。

  ## 保留规则
  - 保留每个参与者说了什么关键内容
  - 保留话题转换节点
  - 保留有情感意义的互动（开玩笑、争论、感谢等）
  - 保留提到的具体事实（时间、地点、人名、数字）
  - 删除重复的闲聊和无意义的水话

  ## 格式要求
  用简洁的要点格式，按时间顺序排列。

  之前的摘要:
  {summary}

  新对话:
  {new_lines}

  摘要不超过 {max_tokens} 字。

  压缩后的摘要:
metadata:
  type: 'PROMPT'
  version: 'social_compressor.v1'
