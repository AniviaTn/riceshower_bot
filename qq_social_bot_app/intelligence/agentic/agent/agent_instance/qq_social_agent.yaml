info:
  name: 'qq_social_agent'
  description: 'QQ group chat social AI assistant with Markdown + ChromaDB memory'
profile:
  prompt_version: qq_social_agent.v1
  max_iterations: 100
  llm_model:
    name: 'social_main_llm'
    temperature: 0.8
    max_tokens: 64000
action:
  tool:
    - 'send_qq_message'
    - 'zenmux_web_search_tool'
    - 'memory_search'
    - 'memory_read'
    - 'memory_write'
    - 'search_chat_history_tool'
  toolkit: []
  skill:
    - 'agent-browser'
memory:
  name: 'qq_social_memory'
meta_class: qq_social_bot_app.intelligence.agentic.agent.agent_instance.qq_social_agent.QQSocialAgent
