name: 'zenmux_web_search_tool'
description: |
  该工具进行实时网络搜索，工具接受两个参数：
    - input: 你想搜索的内容（必填）
    - search_context_size: 搜索上下文大小（选填），可选值为 low / medium / high，默认为 medium
      - low: 适用于简单查询，响应更快
      - medium: 平衡选择，适用于大多数场景
      - high: 适用于需要深入研究的复杂问题
  工具输入示例：
    示例1: 你想要搜索上海的天气时，input 应该是：上海今天的天气
    示例2: 你想要深入研究某个复杂话题时，input 应该是：量子计算最新进展，search_context_size 应该是：high
tool_type: 'api'
input_keys: ['input']
metadata:
  type: 'TOOL'
  module: 'qq_social_bot_app.intelligence.agentic.tool.zenmux_web_search_tool'
  class: 'ZenmuxWebSearchTool'
